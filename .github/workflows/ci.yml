name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  puppet-static:
    name: Puppet static validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Unit tests
        run: bundle exec rake spec

      - name: Static lint
        run: ./scripts/lint.sh

      - name: Docker Compose syntax
        run: docker compose config

