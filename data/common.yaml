---
# Hiera data shared by all nodes in this lab.
#
# Puppet performs automatic parameter lookup for keys of the form
# "<class>::<param>". Override per-node by adding additional levels
# in hiera.yaml.

# ─── isp_bind ──────────────────────────────────────────────────────
isp_bind::listen_v6: true

# ─── node classification ──────────────────────────────────────────
profile::classes:
  - 'isp_opendkim'
  - 'isp_bind'
  - 'isp_dhcp'
  - 'isp_kea'
  - 'isp_postfix'
  - 'isp_dovecot'
  - 'isp_backup'
  - 'isp_monitoring'
  - 'isp_nginx'

isp_bind::zones:
  'lab.local':
    role: 'primary'
    ttl: 300
    serial: 2026051302
    primary_ns: 'ns1.lab.local.'
    admin_email: 'hostmaster.lab.local.'
    refresh: 3600
    retry: 900
    expire: 604800
    negative_ttl: 300
    allow_transfer:
      - '172.28.53.11'
    also_notify:
      - '172.28.53.11'
    records:
      - name: '@'
        type: 'NS'
        value: 'ns1.lab.local.'
      - name: '@'
        type: 'NS'
        value: 'ns2.lab.local.'
      - name: '@'
        type: 'MX'
        priority: 10
        value: 'mail.lab.local.'
      - name: 'ns1'
        type: 'A'
        value: '172.28.53.10'
      - name: 'ns2'
        type: 'A'
        value: '172.28.53.11'
      - name: 'ns1'
        type: 'AAAA'
        value: '2001:db8::10'
      - name: 'www'
        type: 'A'
        value: '192.0.2.20'
      - name: 'mail'
        type: 'A'
        value: '192.0.2.25'
      - name: 'puppet-lab'
        type: 'A'
        value: '172.28.53.10'
      - name: '@'
        type: 'TXT'
        value: '"v=spf1 mx -all"'
      - name: '_dmarc'
        type: 'TXT'
        value: '"v=DMARC1; p=none; rua=mailto:postmaster@lab.local"'
    includes:
      - '/etc/opendkim/keys/lab.local/default.txt'

# ─── isp_opendkim ──────────────────────────────────────────────────
isp_opendkim::domain: 'lab.local'
isp_opendkim::selector: 'default'
isp_opendkim::socket: 'inet:8891@127.0.0.1'
isp_opendkim::trusted_hosts:
  - '127.0.0.1'
  - 'localhost'
  - '172.28.53.0/24'
  - '*.lab.local'

# ─── isp_dhcp ──────────────────────────────────────────────────────
# RFC 5737 TEST-NET-1 (documentation-only address space)
isp_dhcp::subnet:      '192.0.2.0'
isp_dhcp::netmask:     '255.255.255.0'
isp_dhcp::range_start: '192.0.2.100'
isp_dhcp::range_end:   '192.0.2.200'
isp_dhcp::router:      '192.0.2.1'
isp_dhcp::manage_service: false

# ─── isp_kea ───────────────────────────────────────────────────────
isp_kea::subnet_cidr:     '192.0.2.0/24'
isp_kea::range_start:     '192.0.2.100'
isp_kea::range_end:       '192.0.2.200'
isp_kea::router:          '192.0.2.1'
isp_kea::dns_servers:
  - '9.9.9.9'
  - '1.1.1.1'
isp_kea::domain_name:     'lab.local'
isp_kea::manage_service:  false

# ─── isp_postfix ───────────────────────────────────────────────────
isp_postfix::myhostname: 'puppet-lab.local'
isp_postfix::mydomain:   'lab.local'
isp_postfix::submission_enabled: true
isp_postfix::dkim_milter_enabled: true
isp_postfix::dkim_milter_socket: 'inet:127.0.0.1:8891'

# ─── isp_dovecot ───────────────────────────────────────────────────
isp_dovecot::mail_location: 'maildir:~/Maildir'
isp_dovecot::disable_plaintext_auth: false
isp_dovecot::auth_mechanisms:
  - 'plain'
  - 'login'
isp_dovecot::virtual_uid: 5000
isp_dovecot::virtual_gid: 5000
isp_dovecot::virtual_mail_root: '/var/mail/vhosts'
isp_dovecot::virtual_mail_domain: 'lab.local'
isp_dovecot::lab_users:
  'labuser@lab.local':
    # Dummy lab credential for SMTP AUTH smoke tests only.
    # Password: labpass
    password_hash: '{SHA512-CRYPT}$6$XvKyn.NM04ZNI68g$MCEKBImPU/IZMTi6MoByOy1befPdszdfAo28Tk5FbcOaZBGhdz3K2SjhqiqwZ6wBGfHknZpWTgs/njd2uErOX/'
    home: '/var/mail/vhosts/lab.local/labuser'

# ─── isp_backup ────────────────────────────────────────────────────
isp_backup::repository: '/var/backups/restic/lab-repo'
isp_backup::password_file: '/etc/restic/lab-password'
isp_backup::password: 'lab-restic-passphrase'
isp_backup::backup_paths:
  - '/etc/bind'
  - '/etc/postfix'
  - '/etc/dovecot'
  - '/etc/opendkim'
  - '/lab/data'
isp_backup::keep_daily:   7
isp_backup::keep_weekly:  4
isp_backup::keep_monthly: 6
isp_backup::keep_yearly:  1
isp_backup::prune:        true

# ─── isp_monitoring ────────────────────────────────────────────────
isp_monitoring::listen_address: '0.0.0.0:9100'
isp_monitoring::textfile_directory: '/var/lib/node_exporter/textfile_collector'
isp_monitoring::metrics_file: '/var/lib/node_exporter/textfile_collector/puppet_lab.prom'
isp_monitoring::alert_rules_directory: '/etc/prometheus/rules'
isp_monitoring::alert_rules_file: '/etc/prometheus/rules/puppet-lab-alerts.yml'
isp_monitoring::health_check_file: '/usr/local/sbin/lab-monitoring-health'
isp_monitoring::alert_for: '2m'
isp_monitoring::stale_seconds: 300
isp_monitoring::services:
  - 'named'
  - 'master'
  - 'dovecot'
  - 'opendkim'
  - 'nginx'
isp_monitoring::tcp_checks:
  submission:
    host: '127.0.0.1'
    port: 587
  opendkim_milter:
    host: '127.0.0.1'
    port: 8891

# ─── isp_nginx ─────────────────────────────────────────────────────
isp_nginx::server_name: 'puppet-lab.local'
