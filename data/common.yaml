---
# Hiera data shared by all nodes in this lab.
#
# Puppet performs automatic parameter lookup for keys of the form
# "<class>::<param>". Override per-node by adding additional levels
# in hiera.yaml.

# ─── isp_bind ──────────────────────────────────────────────────────
isp_bind::listen_v6: true

# ─── node classification ──────────────────────────────────────────
profile::classes:
  - 'isp_bind'
  - 'isp_dhcp'
  - 'isp_postfix'
  - 'isp_dovecot'
  - 'isp_nginx'

isp_bind::zones:
  'lab.local':
    role: 'primary'
    ttl: 300
    serial: 2026051301
    primary_ns: 'ns1.lab.local.'
    admin_email: 'hostmaster.lab.local.'
    refresh: 3600
    retry: 900
    expire: 604800
    negative_ttl: 300
    allow_transfer:
      - '172.28.53.11'
    also_notify:
      - '172.28.53.11'
    records:
      - name: '@'
        type: 'NS'
        value: 'ns1.lab.local.'
      - name: '@'
        type: 'NS'
        value: 'ns2.lab.local.'
      - name: '@'
        type: 'MX'
        priority: 10
        value: 'mail.lab.local.'
      - name: 'ns1'
        type: 'A'
        value: '172.28.53.10'
      - name: 'ns2'
        type: 'A'
        value: '172.28.53.11'
      - name: 'ns1'
        type: 'AAAA'
        value: '2001:db8::10'
      - name: 'www'
        type: 'A'
        value: '192.0.2.20'
      - name: 'mail'
        type: 'A'
        value: '192.0.2.25'
      - name: 'puppet-lab'
        type: 'A'
        value: '172.28.53.10'

# ─── isp_dhcp ──────────────────────────────────────────────────────
# RFC 5737 TEST-NET-1 (documentation-only address space)
isp_dhcp::subnet:      '192.0.2.0'
isp_dhcp::netmask:     '255.255.255.0'
isp_dhcp::range_start: '192.0.2.100'
isp_dhcp::range_end:   '192.0.2.200'
isp_dhcp::router:      '192.0.2.1'
isp_dhcp::manage_service: false

# ─── isp_postfix ───────────────────────────────────────────────────
isp_postfix::myhostname: 'puppet-lab.local'
isp_postfix::mydomain:   'lab.local'
isp_postfix::submission_enabled: true

# ─── isp_dovecot ───────────────────────────────────────────────────
isp_dovecot::mail_location: 'maildir:~/Maildir'
isp_dovecot::disable_plaintext_auth: false
isp_dovecot::auth_mechanisms:
  - 'plain'
  - 'login'
isp_dovecot::virtual_uid: 5000
isp_dovecot::virtual_gid: 5000
isp_dovecot::virtual_mail_root: '/var/mail/vhosts'
isp_dovecot::virtual_mail_domain: 'lab.local'
isp_dovecot::lab_users:
  'labuser@lab.local':
    # Dummy lab credential for SMTP AUTH smoke tests only.
    # Password: labpass
    password_hash: '{SHA512-CRYPT}$6$XvKyn.NM04ZNI68g$MCEKBImPU/IZMTi6MoByOy1befPdszdfAo28Tk5FbcOaZBGhdz3K2SjhqiqwZ6wBGfHknZpWTgs/njd2uErOX/'
    home: '/var/mail/vhosts/lab.local/labuser'

# ─── isp_nginx ─────────────────────────────────────────────────────
isp_nginx::server_name: 'puppet-lab.local'
