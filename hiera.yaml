---
# hiera.yaml v5 — Puppet 8 compatible.
#
# Defines WHERE Puppet looks for class parameters at compile time.
# When a class declares `$param`, Puppet performs an automatic lookup
# for "<class>::<param>" in the hierarchy below, *before* falling back
# to the manifest default (if any).
#
# Current hierarchy: per-node overrides first, then shared lab defaults.
# This lets the primary and secondary DNS nodes use the same Puppet class
# with different zone roles.

version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: "Per-node data"
    path: "nodes/%{trusted.certname}.yaml"
  - name: "Common defaults"
    path: "common.yaml"
